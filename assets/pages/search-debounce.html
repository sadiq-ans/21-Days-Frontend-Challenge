<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Basic Meta Setup -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search with Debounce</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- External CSS -->
    <link rel="stylesheet" href="../css/style.css">

    <style>
        /* Reset + Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Inter", sans-serif;
        }

        /* Body Layout */
        body {
            background: var(--s-dark-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white !important;
        }

        /* Main Container */
        .container {
            width: 100%;
            max-width: 380px;
            background: transparent;
            backdrop-filter: blur(10px);
            border-radius: 10px;
            padding: 20px;
            animation: fadeIn 0.5s ease;
        }

        /* Title */
        h1 {
            text-align: center;
            margin-bottom: 15px;
        }

        /* Search Input */
        input {
            width: 100%;
            padding: 10px;
            background: transparent;
            border: 2px solid var(--s-secondry-bg-color);
            border-radius: 5px;
            outline: none;
            font-size: 15px;
            transition: var(--s-transition);
            color: white;
        }

        /* Placeholder Style */
        input::placeholder {
            color: var(--s-tertiary-color);
        }

        /* Input Focus State */
        input:focus {
            border-color: var(--s-primary-color);
        }

        /* Status Text (Searching / No Results) */
        #status {
            margin: 12px 5px;
            font-size: 14px;
            color: #666;
        }

        /* Results List Container */
        ul {
            list-style: none;
            margin-top: 10px;
            max-height: 300px;

            /* Hide scrollbar (Firefox) */
            scrollbar-width: none;
        }

        /* Individual Result Item */
        li {
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            margin-bottom: 8px;
            background: var(--s-primary-bg-color);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 5px;
            cursor: pointer;
            transition: 0.25s;
        }

        /* Hover Effect */
        li:hover {
            background: var(--s-primary-color);
            color: #fff;
            transform: translateX(5px);
        }

        /* Hide Scrollbar (Chrome, Edge, Safari) */
        ul::-webkit-scrollbar {
            display: none;
        }

        /* Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive Design */
        @media (max-width: 600px) {
            .container {
                margin: 15px;
                padding: 20px;
            }

            h1 {
                font-size: 18px;
            }

            input {
                font-size: 14px;
            }

            li {
                font-size: 13px;
                padding: 10px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- App Title -->
        <h1>Developer Search</h1>

        <!-- Search Input -->
        <input type="text" id="searchInput" placeholder="type for search..." />

        <!-- Status Message -->
        <p id="status"></p>

        <!-- Search Results -->
        <ul id="results"></ul>
    </div>

    <script>
        // DOM Elements
        const searchInput = document.getElementById("searchInput");
        const results = document.getElementById("results");
        const statusText = document.getElementById("status");

        // Static Developer Articles Data
        const articles = [
            "How to create a React app?",
            "Understanding JavaScript closures",
            "CSS Flexbox complete guide",
            "How to use async/await in JavaScript",
            "Build a responsive navbar with HTML CSS",
            "What is debouncing in JavaScript?",
            "How to create a REST API using Node.js",
            "React hooks explained simply",
            "How to deploy website on Netlify",
            "JavaScript event loop explained",
            "How to build a to-do app in JavaScript",
            "Difference between var, let and const",
            "How to use localStorage in web apps",
            "Build a weather app using API",
            "How to optimize website performance"
        ];

        // Timer variable for debounce
        let timer;

        // Debounce Function
        function debounceSearch(value) {
            // Clear previous timer
            clearTimeout(timer);

            // Show searching status
            statusText.textContent = "Searching...";

            // Set new timer
            timer = setTimeout(() => {
                // Filter articles based on input
                const filtered = articles.filter(article =>
                    article.toLowerCase().includes(value.toLowerCase())
                );

                // Display results
                displayResults(filtered);
            }, 500); // 500ms delay
        }

        // Function to display results
        function displayResults(data) {
            // Clear previous results
            results.innerHTML = "";

            // If no results found
            if (data.length === 0) {
                statusText.textContent = "No results found";
                return;
            }

            // Clear status text
            statusText.textContent = "";

            // Loop through results and create list items
            data.forEach(article => {
                const li = document.createElement("li");
                li.textContent = article;
                results.appendChild(li);
            });
        }

        // Input Event Listener
        searchInput.addEventListener("input", (e) => {
            const value = e.target.value.trim();

            // If input is empty
            if (value === "") {
                results.innerHTML = "";
                statusText.textContent = "";
                return;
            }

            // Call debounce function
            debounceSearch(value);
        });
    </script>

</body>

</html>
