<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <!-- Responsive layout for all devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>

    <!-- Google Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Icon Library (optional, not used currently) -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <!-- External CSS Variables / Global Styles -->
    <link rel="stylesheet" href="../css/style.css">

    <style>
        /* Reset default styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        /* Center the form vertically & horizontally */
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--s-dark-color);
        }

        /* Main container styling */
        .container {
            padding: 25px;
            border-radius: 10px;
            width: 350px;
            color: var(--s-tertiary-color);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        /* Form group wrapper */
        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        /* Label styling */
        .form-group label {
            font-weight: 400;
            font-size: 14px;
            margin: 0 0 8px;
        }

        /* Input field styling */
        .form-group input {
            padding: 6px 12px;
            font-size: 16px;
            background: transparent !important;
            border: 2px solid var(--s-secondry-bg-color);
            border-radius: 5px;
            outline: none;
            transition: 0.3s;
            color: var(--s-tertiary-color);
        }

        /* Placeholder styling */
        .form-group input::placeholder {
            opacity: 0.3;
        }

        /* Focus effect */
        .form-group input:focus {
            border-color: var(--s-primary-color);
        }

        /* Submit button */
        button {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            background: var(--s-primary-color);
            color: white;
            border: 1px solid var(--s-primary-color);
            border-radius: 5px;
            cursor: pointer;
            transition: var(--s-transition);
        }

        /* Hover effect */
        button:hover {
            background: transparent;
        }

        /* Error message text */
        .error {
            color: var(--s-secondry-color);
            font-size: 12px;
            height: 14px;
        }

        /* Success state (valid input) */
        .success input {
            border-color: var(--s-primary-color);
        }

        /* Error border state */
        .error-border input {
            border-color: var(--s-tertiary-color);
        }

        /* Terms checkbox group */
        #termsGroup label {
            font-size: 14px !important;
        }

        /* Custom checkbox color */
        input[type="checkbox"] {
            accent-color: var(--s-primary-color);
        }

        #termsGroup input {
            width: auto;
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- Main Form -->
        <form id="form">
            <h2>Signup</h2>

            <!-- Full Name -->
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Enter your name">
                <small class="error"></small>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label>Email</label>
                <input type="text" id="email" placeholder="Enter your email">
                <small class="error"></small>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password">
                <small class="error"></small>
            </div>

            <!-- Confirm Password -->
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm password">
                <small class="error"></small>
            </div>

            <!-- Terms & Conditions -->
            <div class="form-group" id="termsGroup">
                <label style="display:flex; align-items:center; gap:8px;">
                    <input type="checkbox" id="terms">
                    I accept Terms & Conditions
                </label>
                <small class="error"></small>
            </div>

            <!-- Submit Button -->
            <button type="submit">Submit</button>
        </form>
    </div>

    <script>
        // Select DOM elements
        const form = document.getElementById("form");
        const nameInput = document.getElementById("name");
        const email = document.getElementById("email");
        const password = document.getElementById("password");
        const confirmPassword = document.getElementById("confirmPassword");
        const terms = document.getElementById("terms");
        const termsGroup = document.getElementById("termsGroup");

        // Real-time validation on input typing
        [nameInput, email, password, confirmPassword].forEach(input => {
            input.addEventListener("input", validateInputs);
        });

        // Form submit event
        form.addEventListener("submit", function (e) {
            e.preventDefault(); // Prevent page reload

            const isValid = validateInputs(); // Run validation

            // If all inputs are valid
            if (isValid) {
                alert("Successfully submitted");

                // Reload page after short delay
                setTimeout(function () {
                    location.reload();
                }, 500);
            }
        });

        // Main validation function
        function validateInputs() {
            const nameValue = nameInput.value.trim();
            const emailValue = email.value.trim();
            const passwordValue = password.value.trim();
            const confirmPasswordValue = confirmPassword.value.trim();

            let isValid = true;

            // Name validation
            if (nameValue === "") {
                setError(nameInput, "Name is required");
                isValid = false;
            } else {
                setSuccess(nameInput);
            }

            // Email validation
            if (emailValue === "") {
                setError(email, "Email is required");
                isValid = false;
            } else if (!isValidEmail(emailValue)) {
                setError(email, "Enter valid email");
                isValid = false;
            } else {
                setSuccess(email);
            }

            // Password validation
            if (passwordValue === "") {
                setError(password, "Password is required");
                isValid = false;
            } else if (passwordValue.length < 6) {
                setError(password, "Minimum 6 characters required");
                isValid = false;
            } else {
                setSuccess(password);
            }

            // Confirm password validation
            if (confirmPasswordValue === "") {
                setError(confirmPassword, "Confirm your password");
                isValid = false;
            } else if (confirmPasswordValue !== passwordValue) {
                setError(confirmPassword, "Passwords do not match");
                isValid = false;
            } else {
                setSuccess(confirmPassword);
            }

            // Terms validation
            const small = termsGroup.querySelector(".error");
            if (!terms.checked) {
                small.innerText = "You must accept terms";
                termsGroup.classList.add("error-border");
                termsGroup.classList.remove("success");
                isValid = false;
            } else {
                small.innerText = "";
                termsGroup.classList.add("success");
                termsGroup.classList.remove("error-border");
            }

            return isValid;
        }

        // Show error message
        function setError(input, message) {
            const formGroup = input.parentElement;
            const small = formGroup.querySelector(".error");

            small.innerText = message;
            formGroup.classList.add("error-border");
            formGroup.classList.remove("success");
        }

        // Show success state
        function setSuccess(input) {
            const formGroup = input.parentElement;
            const small = formGroup.querySelector(".error");

            small.innerText = "";
            formGroup.classList.add("success");
            formGroup.classList.remove("error-border");
        }

        // Email validation using regex pattern
        function isValidEmail(email) {
            const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return regex.test(email);
        }
    </script>

</body>

</html>
