<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Basic Meta Setup -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- External CSS -->
    <link rel="stylesheet" href="../css/style.css">

    <style>
        /* Reset + Global Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        body {
            height: 100vh;
            background: var(--s-dark-color);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-family: 'Inter', sans-serif;
        }

        /* Main Container */
        .container {
            padding: 20px;
            width: 600px;
            border-radius: 10px;
        }

        /* Card UI */
        .card {
            background: transparent;
            padding: 25px;
            border-radius: 15px;
            max-width: 400px;
            margin: auto;
        }

        /* Title */
        h1 {
            text-align: center;
            margin-bottom: 15px;
        }

        /* Password Input + Copy Button */
        .input-group {
            display: flex;
            gap: 10px;
        }

        .input-group input {
            flex: 1;
            padding: 10px;
            font-size: 16px;
            background: transparent;
            border: 2px solid var(--s-secondry-bg-color);
            border-radius: 5px;
            outline: none;
            transition: 0.3s;
            color: white;
        }

        .input-group input::placeholder {
            color: var(--s-tertiary-color);
        }

        .input-group input:focus {
            border-color: var(--s-primary-color);
        }

        .input-group button {
            background: var(--s-primary-color);
            color: white;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            padding: 6px 12px;
            border: none;
        }

        /* Options Grid (Checkboxes) */
        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
        }

        .options label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            background: var(--s-primary-bg-color);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 5px;
        }

        /* Custom Checkbox Style */
        .options input[type="checkbox"] {
            width: 20px;
            height: 20px;
            background-color: var(--s-secondry-bg-color);
            border: 2px solid var(--s-secondry-color);
            border-radius: 4px;
            appearance: none;
            cursor: pointer;
            position: relative;
        }

        .options input[type="checkbox"]:checked {
            background-color: var(--s-primary-color);
            border-color: var(--s-primary-color);
        }

        .options input[type="checkbox"]:checked::after {
            content: "✔";
            color: #fff;
            font-size: 12px;
            position: absolute;
            top: 0;
            left: 4px;
        }

        /* Password Length Range */
        .range {
            margin: 15px 0;
        }

        .range label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--s-primary-color);
        }

        /* Generate Button */
        button#generate {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            background: var(--s-primary-color);
            color: white;
            font-size: 16px;
            transition: var(--s-transition);
            border: 1px solid var(--s-primary-color);
            cursor: pointer;
        }

        button#generate:hover {
            background: transparent;
        }

        /* Strength Indicator */
        .strength {
            margin: 15px 0;
        }

        #strengthBar {
            height: 8px;
            border-radius: 5px;
            background: var(--s-danger);
            width: 50%;
            margin-bottom: 5px;
            transition: 0.3s;
        }

        #strengthText {
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="card">

            <!-- App Title -->
            <h1>Password Generator</h1>

            <!-- Password Display + Copy -->
            <div class="input-group">
                <input type="text" id="password" readonly>
                <button id="copyBtn">Copy</button>
            </div>

            <!-- Strength Indicator -->
            <div class="strength">
                <div id="strengthBar"></div>
                <p id="strengthText">Strength</p>
            </div>

            <!-- Options -->
            <div class="options">
                <label>Uppercase <input type="checkbox" id="uppercase" checked></label>
                <label>Lowercase <input type="checkbox" id="lowercase" checked></label>
                <label>Numbers <input type="checkbox" id="numbers" checked></label>
                <label>Symbols <input type="checkbox" id="symbols"></label>
            </div>

            <!-- Length Slider -->
            <div class="range">
                <label>Password Length: <span id="lengthValue">12</span></label>
                <input type="range" id="length" min="4" max="32" value="12">
            </div>

            <!-- Generate Button -->
            <button id="generate">Generate Password</button>
        </div>
    </div>

    <script>
        // =========================
        // DOM ELEMENTS
        // =========================
        const passwordEl = document.getElementById("password");
        const lengthEl = document.getElementById("length");
        const lengthValue = document.getElementById("lengthValue");

        const uppercaseEl = document.getElementById("uppercase");
        const lowercaseEl = document.getElementById("lowercase");
        const numbersEl = document.getElementById("numbers");
        const symbolsEl = document.getElementById("symbols");

        const generateBtn = document.getElementById("generate");
        const copyBtn = document.getElementById("copyBtn");

        const strengthBar = document.getElementById("strengthBar");
        const strengthText = document.getElementById("strengthText");

        // =========================
        // UPDATE LENGTH DISPLAY
        // =========================
        lengthEl.addEventListener("input", () => {
            lengthValue.textContent = lengthEl.value;
        });

        // =========================
        // RANDOM CHARACTER GENERATORS
        // =========================
        function getRandomUpper() {
            return String.fromCharCode(Math.floor(Math.random() * 26) + 65);
        }

        function getRandomLower() {
            return String.fromCharCode(Math.floor(Math.random() * 26) + 97);
        }

        function getRandomNumber() {
            return String.fromCharCode(Math.floor(Math.random() * 10) + 48);
        }

        function getRandomSymbol() {
            const symbols = "!@#$%^&*()_+";
            return symbols[Math.floor(Math.random() * symbols.length)];
        }

        // =========================
        // GENERATE PASSWORD
        // =========================
        generateBtn.addEventListener("click", () => {
            const length = +lengthEl.value;
            let password = "";

            const types = [];

            // Collect selected character types
            if (uppercaseEl.checked) types.push(getRandomUpper);
            if (lowercaseEl.checked) types.push(getRandomLower);
            if (numbersEl.checked) types.push(getRandomNumber);
            if (symbolsEl.checked) types.push(getRandomSymbol);

            // Validation: at least one option must be selected
            if (types.length === 0) {
                alert("Select at least one option!");
                return;
            }

            // Generate password
            for (let i = 0; i < length; i++) {
                const randomFunc = types[Math.floor(Math.random() * types.length)];
                password += randomFunc();
            }

            passwordEl.value = password;

            // Update strength indicator
            updateStrength(password, types.length);

            // Save user settings
            saveSettings();
        });

        // =========================
        // COPY TO CLIPBOARD
        // =========================
        copyBtn.addEventListener("click", () => {
            if (!passwordEl.value) return;

            navigator.clipboard.writeText(passwordEl.value);
            copyBtn.textContent = "✔ Copied";

            setTimeout(() => (copyBtn.textContent = "✔ Copied"), 1500);
        });

        // =========================
        // PASSWORD STRENGTH LOGIC
        // =========================
        function updateStrength(password, variety) {
            let strength = 0;

            if (password.length > 10) strength++;
            if (password.length > 16) strength++;
            if (variety >= 3) strength++;

            if (strength === 1) {
                strengthBar.style.width = "33%";
                strengthBar.style.background = "#dc3545";
                strengthText.textContent = "Weak";
            } else if (strength === 2) {
                strengthBar.style.width = "66%";
                strengthBar.style.background = "#ffc107";
                strengthText.textContent = "Average";
            } else {
                strengthBar.style.width = "100%";
                strengthBar.style.background = "#07a95d";
                strengthText.textContent = "Strong";
            }
        }

        // =========================
        // SAVE SETTINGS (localStorage)
        // =========================
        function saveSettings() {
            const settings = {
                length: lengthEl.value,
                uppercase: uppercaseEl.checked,
                lowercase: lowercaseEl.checked,
                numbers: numbersEl.checked,
                symbols: symbolsEl.checked,
            };

            localStorage.setItem("passwordSettings", JSON.stringify(settings));
        }

        // =========================
        // LOAD SETTINGS ON PAGE LOAD
        // =========================
        function loadSettings() {
            const settings = JSON.parse(localStorage.getItem("passwordSettings"));
            if (!settings) return;

            lengthEl.value = settings.length;
            lengthValue.textContent = settings.length;

            uppercaseEl.checked = settings.uppercase;
            lowercaseEl.checked = settings.lowercase;
            numbersEl.checked = settings.numbers;
            symbolsEl.checked = settings.symbols;
        }

        // Initialize settings
        loadSettings();
    </script>

</body>

</html>
