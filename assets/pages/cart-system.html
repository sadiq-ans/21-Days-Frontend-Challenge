<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce Cart</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --dark: #0f172a;
            --card: #1e293b;
            --primary: #6366f1;
            --light: #cbd5f5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--dark);
            color: white;
            padding: 40px 20px;
        }

        header h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        /* PRODUCT GRID */
        #product-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1100px;
            margin: auto;
        }

        .card {
            background: var(--card);
            padding: 15px;
            border-radius: 12px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 10px;
        }

        .card h3 {
            margin: 10px 0;
        }

        .card p {
            color: var(--light);
        }

        .card button {
            margin-top: 10px;
            width: 100%;
            padding: 8px;
            border: none;
            background: var(--primary);
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        .card button:hover {
            background: transparent;
            border: 1px solid var(--primary);
        }

        /* CART */
        .section {
            max-width: 900px;
            margin: 50px auto 0;
        }

        .cart-container {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
        }

        .cart-detail {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #334155;
        }

        .cart-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .cart-left img {
            width: 60px;
            height: 60px;
            border-radius: 8px;
        }

        .qty-control {
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 5px 0;
        }

        .qty-control button {
            width: 28px;
            height: 28px;
            border-radius: 5px;
            border: none;
            background: var(--primary);
            color: white;
            cursor: pointer;
        }

        .remove-btn {
            background: transparent;
            border: none;
            color: red;
            cursor: pointer;
        }

        .cart-footer {
            margin-top: 20px;
        }

        .cart-footer button {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            background: var(--primary);
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        #empty-msg {
            text-align: center;
            color: gray;
            margin: 20px 0;
            display: none;
        }

        .cart-footer h3 {
            margin-bottom: 8px;
        }

        /* TABLET */
        @media (max-width: 768px) {
            body {
                padding: 20px 10px;
            }

            header h1 {
                font-size: 22px;
            }

            .cart-detail {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }

            .cart-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .cart-left {
                width: 100%;
            }

            .cart-left img {
                width: 50px;
                height: 50px;
            }

            .cart-footer h3 {
                font-size: 18px;
            }
        }

        /* MOBILE */
        @media (max-width: 480px) {
            #product-list {
                grid-template-columns: 1fr;
            }

            .card img {
                height: 150px;
            }

            .card h3 {
                font-size: 16px;
            }

            .card p {
                font-size: 14px;
            }

            .card button {
                padding: 6px;
                font-size: 14px;
            }

            .cart-item {
                padding: 10px 0;
            }

            .qty-control button {
                width: 24px;
                height: 24px;
                font-size: 12px;
            }

            .cart-footer button {
                font-size: 14px;
                padding: 8px;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>Add to Cart</h1>
    </header>

    <!-- PRODUCTS -->
    <section>
        <div id="product-list"></div>
    </section>

    <!-- CART -->
    <section class="section">
        <div class="cart-container">

            <div class="cart-detail">
                <h2>Your Cart</h2>
                <div>
                    Items: <span id="cart-count">0</span> |
                    ₹<span id="cart-total">0</span>
                </div>
            </div>

            <div id="cart-items"></div>

            <div id="empty-msg">No product added</div>

            <div class="cart-footer">
                <h3>Total: ₹<span id="final-total">0</span></h3>
                <button>Continue</button>
            </div>

        </div>
    </section>

    <script>
        const products = [
            { id: 1, name: "Bolzano swivel armchair", price: 899, image: "https://athora-theme-nuxio.myshopify.com/cdn/shop/files/product-bolzano-armchair-with-swivel-function-6-3_79762203-fd8f-427e-93d5-4431578a1e16.jpg?v=1776767479&width=990" },
            { id: 2, name: "Cradle lounge chair", price: 699, image: "https://athora-theme-nuxio.myshopify.com/cdn/shop/files/product-cradle-lounge-hair-2_4f23e748-f754-479d-a497-8197c32ae6c1.jpg?v=1776767431&width=990" },
            { id: 3, name: "Sweet art swivel armchair", price: 1099, image: "https://athora-theme-nuxio.myshopify.com/cdn/shop/files/product-sweet-art-armchair-with-swivel-function-2-21-3_c50b70f7-6c5b-4278-a733-f5969497735e.jpg?v=1776767441&width=990" },
            { id: 4, name: "Nest lounge chair", price: 1090, image: "https://athora-theme-nuxio.myshopify.com/cdn/shop/files/product-nest-lounge-chair-1_rmbg_resize.jpg?v=1776767425&width=990" }
        ];

        let cart = JSON.parse(localStorage.getItem("cart")) || [];

        const productList = document.getElementById("product-list");
        const cartItems = document.getElementById("cart-items");
        const cartCount = document.getElementById("cart-count");
        const cartTotal = document.getElementById("cart-total");
        const finalTotal = document.getElementById("final-total");
        const emptyMsg = document.getElementById("empty-msg");

        function renderProducts() {
            productList.innerHTML = "";
            products.forEach(product => {
                productList.innerHTML += `
                    <div class="card">
                        <img src="${product.image}">
                        <h3>${product.name}</h3>
                        <p>₹${product.price}</p>
                        <button onclick="addToCart(${product.id})">Add to Cart</button>
                    </div>
                `;
            });
        }

        function addToCart(id) {
            const item = cart.find(p => p.id === id);

            if (item) {
                item.quantity++;
            } else {
                const product = products.find(p => p.id === id);
                cart.push({ ...product, quantity: 1 });
            }

            updateCart();
        }

        function increaseQty(index) {
            cart[index].quantity++;
            updateCart();
        }

        function decreaseQty(index) {
            if (cart[index].quantity > 1) {
                cart[index].quantity--;
            } else {
                removeItem(index);
            }
            updateCart();
        }

        function removeItem(index) {
            cart.splice(index, 1);
            updateCart();
        }

        function renderCart() {
            cartItems.innerHTML = "";

            if (cart.length === 0) {
                emptyMsg.style.display = "block";
                return;
            } else {
                emptyMsg.style.display = "none";
            }

            cart.forEach((item, index) => {
                cartItems.innerHTML += `
                    <div class="cart-item">
                        <div class="cart-left">
                            <img src="${item.image}">
                            <div>
                                <p>${item.name}</p>

                                <div class="qty-control">
                                    <button onclick="decreaseQty(${index})">−</button>
                                    <span>${item.quantity}</span>
                                    <button onclick="increaseQty(${index})">+</button>
                                </div>

                                <small>₹${item.price} each</small>
                            </div>
                        </div>

                        <div>
                            ₹${item.price * item.quantity}
                            <button class="remove-btn" onclick="removeItem(${index})">Remove</button>
                        </div>
                    </div>
                `;
            });
        }

        function updateCart() {
            let total = 0;
            let count = 0;

            cart.forEach(item => {
                total += item.price * item.quantity;
                count += item.quantity;
            });

            cartCount.textContent = count;
            cartTotal.textContent = total;
            finalTotal.textContent = total;

            localStorage.setItem("cart", JSON.stringify(cart));

            renderCart();
        }

        renderProducts();
        updateCart();
    </script>

</body>

</html>
