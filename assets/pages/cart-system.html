<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Basic Meta Setup -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart System</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        /* ================= ROOT COLORS ================= */
        :root {
            --dark: #0f172a;
            --card: #1e293b;
            --primary: #6366f1;
            --light: #cbd5f5;
        }

        /* ================= GLOBAL RESET ================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--dark);
            color: white;
            padding: 150px 15px;
        }

        /* ================= CART SECTION ================= */
        .section {
            max-width: 900px;
            margin: auto;
        }

        .cart-container {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
        }

        /* Top section (Title + Total Info) */
        .cart-detail {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        /* Each cart item row */
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #334155;
        }

        /* Left side of item (image + info) */
        .cart-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .cart-left img {
            width: 60px;
            height: 60px;
            border-radius: 8px;
        }

        /* Quantity controls (+ / - buttons) */
        .qty-control {
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 5px 0;
        }

        .qty-control button {
            width: 28px;
            height: 28px;
            border-radius: 5px;
            border: none;
            background: var(--primary);
            color: white;
            cursor: pointer;
        }

        /* Remove button */
        .remove-btn {
            background: transparent;
            border: none;
            color: red;
            cursor: pointer;
        }

        /* Footer section (Total + Checkout) */
        .cart-footer {
            margin-top: 20px;
        }

        .cart-footer button {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            background: var(--primary);
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        .cart-footer h3 {
            margin-bottom: 8px;
        }

        /* Empty cart message */
        #empty-msg {
            text-align: center;
            color: gray;
            margin: 20px 0;
            display: none;
        }

        /* ================= RESPONSIVE ================= */
        @media (max-width: 768px) {
            .cart-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }
    </style>
</head>

<body>

    <!-- ================= CART UI ================= -->
    <section class="section">
        <div class="cart-container">

            <!-- Header: Title + Count + Total -->
            <div class="cart-detail">
                <h2>Your Cart</h2>
                <div>
                    Items: <span id="cart-count">0</span> |
                    ₹<span id="cart-total">0</span>
                </div>
            </div>

            <!-- Dynamic cart items will render here -->
            <div id="cart-items"></div>

            <!-- Empty message -->
            <div id="empty-msg">No product added</div>

            <!-- Footer: Final total + Checkout -->
            <div class="cart-footer">
                <h3>Total: ₹<span id="final-total">0</span></h3>
                <button>Checkout</button>
            </div>

        </div>
    </section>

    <script>
        /* ================= INITIAL DATA ================= */

        // Load cart from localStorage OR use demo data
        let cart = JSON.parse(localStorage.getItem("cart")) || [
            {
                id: 1,
                name: "Demo Chair",
                price: 899,
                image: "https://via.placeholder.com/100",
                quantity: 1
            }
        ];

        /* ================= DOM ELEMENTS ================= */
        const cartItems = document.getElementById("cart-items");
        const cartCount = document.getElementById("cart-count");
        const cartTotal = document.getElementById("cart-total");
        const finalTotal = document.getElementById("final-total");
        const emptyMsg = document.getElementById("empty-msg");

        /* ================= CART ACTIONS ================= */

        // Increase quantity of a product
        function increaseQty(index) {
            cart[index].quantity++;
            updateCart();
        }

        // Decrease quantity OR remove if quantity = 1
        function decreaseQty(index) {
            if (cart[index].quantity > 1) {
                cart[index].quantity--;
            } else {
                removeItem(index);
            }
            updateCart();
        }

        // Remove item completely
        function removeItem(index) {
            cart.splice(index, 1);
            updateCart();
        }

        /* ================= RENDER CART ================= */

        function renderCart() {
            cartItems.innerHTML = "";

            // Show empty message if cart is empty
            if (cart.length === 0) {
                emptyMsg.style.display = "block";
                return;
            } else {
                emptyMsg.style.display = "none";
            }

            // Loop through cart items and render UI
            cart.forEach((item, index) => {
                cartItems.innerHTML += `
                <div class="cart-item">
                    <div class="cart-left">
                        <img src="${item.image}">
                        <div>
                            <p>${item.name}</p>

                            <div class="qty-control">
                                <button onclick="decreaseQty(${index})">−</button>
                                <span>${item.quantity}</span>
                                <button onclick="increaseQty(${index})">+</button>
                            </div>

                            <small>₹${item.price} each</small>
                        </div>
                    </div>

                    <div>
                        ₹${item.price * item.quantity}
                        <button class="remove-btn" onclick="removeItem(${index})">Remove</button>
                    </div>
                </div>
                `;
            });
        }

        /* ================= UPDATE CART ================= */

        function updateCart() {
            let total = 0;
            let count = 0;

            // Calculate total price and total quantity
            cart.forEach(item => {
                total += item.price * item.quantity;
                count += item.quantity;
            });

            // Update UI values
            cartCount.textContent = count;
            cartTotal.textContent = total;
            finalTotal.textContent = total;

            // Save updated cart to localStorage
            localStorage.setItem("cart", JSON.stringify(cart));

            // Re-render cart UI
            renderCart();
        }

        // Initial load
        updateCart();
    </script>

</body>

</html>
